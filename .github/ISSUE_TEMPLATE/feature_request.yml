name: Feature Request
description: Suggest an idea or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping make this project better! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? What use case does it enable?
      placeholder: "As a CSM, I want to... so that I can..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CTAs
        - Health Scores
        - Risk Alerts
        - Database / Queries
        - CRM Integration (Salesforce / HubSpot)
        - Slack / Notifications
        - Authentication / OAuth
        - Deployment / Infrastructure
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Would you be willing to contribute this?
      options:
        - label: "Yes, I'd like to open a PR for this"
