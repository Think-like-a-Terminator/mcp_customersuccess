name: Bug Report
description: Something isn't working correctly
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out as much as you can.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Call tool `create_risk_alert` with ...
        2. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please fill in your environment details.
      value: |
        - OS: [e.g. macOS 14, Ubuntu 22.04]
        - Python version: [e.g. 3.11]
        - Deployment: [local / Docker / Cloud Run]
        - MCP Client: [Claude Desktop / VS Code Copilot / other]
        - Server version / commit:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error messages
      description: Paste any relevant output here.
      render: shell
