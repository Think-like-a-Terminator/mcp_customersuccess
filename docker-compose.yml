version: '3.8'

services:
  # MCP Server
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: customer-success-mcp
    # Use lazy-auth variant: tool discovery is public, OAuth triggers on tools/call
    command: >
      gunicorn "src.server:create_sse_app()"
      --bind 0.0.0.0:8000
      --worker-class uvicorn.workers.UvicornWorker
      --workers 1
      --timeout 120
      --access-logfile -
      --error-logfile -
    ports:
      - "8000:8000"
    environment:
      # Authentication
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      
      # PostgreSQL (connect to postgres service)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-customer_success}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      
      # OAuth (public URL the browser can reach)
      - OAUTH_PUBLIC_BASE_URL=${OAUTH_PUBLIC_BASE_URL:-http://localhost:8000}

      # Slack (optional)
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}

      # Salesforce (optional)
      - SALESFORCE_USERNAME=${SALESFORCE_USERNAME}
      - SALESFORCE_PASSWORD=${SALESFORCE_PASSWORD}
      - SALESFORCE_SECURITY_TOKEN=${SALESFORCE_SECURITY_TOKEN}
      - SALESFORCE_DOMAIN=${SALESFORCE_DOMAIN:-login}

      # HubSpot (optional)
      - HUBSPOT_API_KEY=${HUBSPOT_API_KEY}
    
    depends_on:
      - postgres
    
    networks:
      - mcp-network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: mcp-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-customer_success}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mcp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  mcp-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
